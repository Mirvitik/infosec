name: Build app
on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]
  workflow_dispatch:

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-java@v4
        with:
          distribution: 'corretto'
          java-version: '17'
      - name: Grant permission
        run: chmod +x ./gradlew
      - name: Build APK
        run: ./gradlew android:assembleRelease --stacktrace
      - name: Build AAB
        run: ./gradlew android:bundleRelease --stacktrace
      - uses: actions/upload-artifact@v4
        with:
          name: builds
          path: |
            android/build/outputs/apk/release
            android/build/outputs/bundle/release
