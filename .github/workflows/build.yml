name: Build app
on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]
  workflow_dispatch:

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-java@v4
        with:
          distribution: 'corretto'
          java-version: '17'
      - name: Grant permission
        run: chmod +x ./gradlew
      - name: Build APK
        run: ./gradlew assembleRelease --stacktrace

      - name: Build AAB
        run: ./gradlew bundleRelease --stacktrace

      - name: List project structure
        if: always()
        run: |
          echo "=== Root ==="
          ls -la
          echo "=== app/ ==="
          ls -la app/ 2>/dev/null || echo "no app dir"
          echo "=== app/build/ ==="
          ls -la app/build/ 2>/dev/null || echo "no build dir"
          echo "=== Gradle version ==="
          ./gradlew --version

      - name: List build outputs
        if: always()
        run: find app/build/outputs -type f 2>/dev/null || echo "outputs dir not found"

      - uses: actions/upload-artifact@v4
        with:
          name: builds
          path: |
            app/build/outputs/apk/release
            app/build/outputs/bundle/release
